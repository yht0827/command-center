# 도메인 간 관계 (Cross-Domain Relations)
# 둘 이상의 도메인에 걸친 relation만 이 파일에 정의한다.
# 단일 도메인 내에서 완결되는 relation은 각 도메인 abox 파일에 둔다.
#
# from/to 형식: "{도메인id}/{entity-id}"
# 예: from: commerce-order/order, to: commerce-inventory/stock
#
# 도메인 abox가 추가되면 이 파일도 함께 갱신한다.
# tbox.yaml의 relation_types와 domain_range axiom을 준수한다.

relations:
  # 주문 → 카탈로그: 상품 정보·가격 재검증
  - from: commerce-order/order-placement
    to: commerce-catalog/product
    type: references
    note: |
      주문 생성 시 라인 아이템마다 catalog의 product를 조회해 가격·노출 상태를
      재검증한다. 장바구니 시점과 결제 시점 가격이 다르면 사용자 확인을 요구.

  # 주문 → 재고: 동기 RPC로 재고 점유
  - from: commerce-order/order-placement
    to: commerce-inventory/stock-reservation
    type: triggers
    note: |
      주문 생성 시점에 inventory의 stock-reservation을 동기 RPC로 호출하여
      재고를 점유한다. 점유 실패 시 주문 생성이 즉시 중단된다.

  # 재고 → 주문: 결제 이벤트 비동기 구독으로 확정/복원
  - from: commerce-inventory/stock-fulfillment
    to: commerce-order/order-event
    type: consumes
    note: |
      Kafka의 commerce.order.paid / commerce.order.refunded 토픽을 구독하여
      paid 시 재고 확정, refunded 시 재고 복원을 비동기로 처리한다.
